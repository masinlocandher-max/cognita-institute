    <script>
      (() => {
        const redirectKey = "cognita:spa-redirect";
        const redirectTarget = window.sessionStorage.getItem(redirectKey);

        if (redirectTarget) {
          window.sessionStorage.removeItem(redirectKey);
          window.history.replaceState(null, "", redirectTarget);
        }
      })();
    </script>
