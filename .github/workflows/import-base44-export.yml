name: Import and clean Base44 export

on:
  workflow_dispatch:
  push:
    branches:
      - import/base44-export
    paths:
      - cognita-ai-academy.zip
      - scripts/import_base44_zip.py
      - scripts/clean_cognita.py
      - .github/workflows/import-base44-export.yml
  pull_request:
    branches:
      - main
    paths:
      - cognita-ai-academy.zip
      - scripts/import_base44_zip.py
      - scripts/clean_cognita.py
      - .github/workflows/import-base44-export.yml

permissions:
  contents: write

jobs:
  import-and-clean:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out import branch
        uses: actions/checkout@v4
        with:
          ref: import/base44-export

      - name: Extract Base44 source safely
        run: python scripts/import_base44_zip.py

      - name: Apply verified cleanup
        run: python scripts/clean_cognita.py

      - name: Refresh dependency lockfile
        run: npm install --package-lock-only --ignore-scripts

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Remove unused imports
        run: npm run lint:fix

      - name: Verify lint
        run: npm run lint

      - name: Verify typecheck
        run: npm run typecheck

      - name: Verify dependency audit
        run: npm audit --audit-level=moderate

      - name: Verify production build
        run: npm run build

      - name: Commit cleaned source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git reset -- dist node_modules .vite 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No source changes to commit."
          else
            git commit -m "Clean imported Cognita source"
            git push origin HEAD:import/base44-export
          fi
