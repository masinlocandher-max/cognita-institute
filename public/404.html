<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Redirecting to Cognita Institute</title>
    <script>
      (() => {
        const redirectKey = "cognita:spa-redirect";
        const requestedPath = `${window.location.pathname}${window.location.search}${window.location.hash}`;
        window.sessionStorage.setItem(redirectKey, requestedPath);
        window.location.replace("/");
      })();
    </script>
  </head>
  <body>
    <p>Redirecting to Cognita Institute…</p>
  </body>
</html>
